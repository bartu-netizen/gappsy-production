# ─────────────────────────────────────────────────────────────
# SECURITY HEADERS (all routes)
# ─────────────────────────────────────────────────────────────
[[headers]]
for = "/*"

[headers.values]
X-Content-Type-Options = "nosniff"
X-Frame-Options = "DENY"
X-XSS-Protection = "1; mode=block"
Referrer-Policy = "strict-origin-when-cross-origin"
Permissions-Policy = "camera=(), microphone=(), geolocation=()"

# ─────────────────────────────────────────────────────────────
# HASHED ASSETS — 1 year immutable cache
# These files have content hashes in their filenames, so they
# can be cached forever. Safe to set immutable.
# ─────────────────────────────────────────────────────────────
[[headers]]
for = "/assets/*.js"

[headers.values]
Cache-Control = "public, max-age=31536000, immutable"
Content-Type = "application/javascript; charset=utf-8"

[[headers]]
for = "/assets/*.css"

[headers.values]
Cache-Control = "public, max-age=31536000, immutable"
Content-Type = "text/css; charset=utf-8"

[[headers]]
for = "/assets/*.png"

[headers.values]
Cache-Control = "public, max-age=31536000, immutable"
Content-Type = "image/png"

[[headers]]
for = "/assets/*.jpg"

[headers.values]
Cache-Control = "public, max-age=31536000, immutable"
Content-Type = "image/jpeg"

[[headers]]
for = "/assets/*.webp"

[headers.values]
Cache-Control = "public, max-age=31536000, immutable"
Content-Type = "image/webp"

[[headers]]
for = "/assets/*.svg"

[headers.values]
Cache-Control = "public, max-age=31536000, immutable"
Content-Type = "image/svg+xml"

[[headers]]
for = "/assets/*.woff"

[headers.values]
Cache-Control = "public, max-age=31536000, immutable"
Content-Type = "font/woff"

[[headers]]
for = "/assets/*.woff2"

[headers.values]
Cache-Control = "public, max-age=31536000, immutable"
Content-Type = "font/woff2"

[[headers]]
for = "/assets/*.ttf"

[headers.values]
Cache-Control = "public, max-age=31536000, immutable"
Content-Type = "font/ttf"

[[headers]]
for = "/assets/*.otf"

[headers.values]
Cache-Control = "public, max-age=31536000, immutable"
Content-Type = "font/otf"

# ─────────────────────────────────────────────────────────────
# FAVICON & ICONS — long-lived cache
# ─────────────────────────────────────────────────────────────
[[headers]]
for = "/favicon.ico"

[headers.values]
Content-Type = "image/x-icon"
Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
for = "/favicon.png"

[headers.values]
Content-Type = "image/png"
Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
for = "/favicon-*.png"

[headers.values]
Content-Type = "image/png"
Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
for = "/apple-touch-icon.png"

[headers.values]
Content-Type = "image/png"
Cache-Control = "public, max-age=31536000, immutable"

# ─────────────────────────────────────────────────────────────
# PUBLIC IMAGES (non-hashed) — 1 week cache
# ─────────────────────────────────────────────────────────────
[[headers]]
for = "/*.webp"

[headers.values]
Cache-Control = "public, max-age=604800, stale-while-revalidate=86400"
Content-Type = "image/webp"

[[headers]]
for = "/*.png"

[headers.values]
Cache-Control = "public, max-age=604800, stale-while-revalidate=86400"
Content-Type = "image/png"

[[headers]]
for = "/*.jpg"

[headers.values]
Cache-Control = "public, max-age=604800, stale-while-revalidate=86400"
Content-Type = "image/jpeg"

[[headers]]
for = "/*.svg"

[headers.values]
Cache-Control = "public, max-age=604800, stale-while-revalidate=86400"
Content-Type = "image/svg+xml"

[[headers]]
for = "/og/*.svg"

[headers.values]
Cache-Control = "public, max-age=604800, stale-while-revalidate=86400"
Content-Type = "image/svg+xml"

[[headers]]
for = "/og/*.png"

[headers.values]
Cache-Control = "public, max-age=604800, stale-while-revalidate=86400"
Content-Type = "image/png"

[[headers]]
for = "/images/*"

[headers.values]
Cache-Control = "public, max-age=604800, stale-while-revalidate=86400"

[[headers]]
for = "/logos/*"

[headers.values]
Cache-Control = "public, max-age=604800, stale-while-revalidate=86400"

# ─────────────────────────────────────────────────────────────
# STATE DATA JSON — short cache with SWR
# ─────────────────────────────────────────────────────────────
[[headers]]
for = "/data/*.json"

[headers.values]
Cache-Control = "public, max-age=300, stale-while-revalidate=86400"
Content-Type = "application/json; charset=utf-8"


name: Monthly Agency Reviews Update

# Runs on the 1st day of every month at 03:00 UTC
# Also supports manual triggering via GitHub UI
on:
  schedule:
    # Cron format: minute hour day-of-month month day-of-week
    # Runs at 03:00 UTC on the 1st of every month
    - cron: '0 3 1 * *'

  # Allow manual workflow dispatch from GitHub Actions UI
  workflow_dispatch:

jobs:
  update-agency-reviews:
    name: Update Agency Reviews Last Updated
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run monthly update script
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: node scripts/monthly-touch-agency-reviews.mjs

      - name: Report completion
        if: success()
        run: |
          echo "✅ Monthly agency reviews update completed successfully"
          echo "📅 Updated at: $(date -u +"%Y-%m-%d %H:%M:%S UTC")"

      - name: Report failure
        if: failure()
        run: |
          echo "❌ Monthly agency reviews update failed"
          echo "📅 Failed at: $(date -u +"%Y-%m-%d %H:%M:%S UTC")"
          exit 1
